version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pam
      POSTGRES_PASSWORD: pam
      POSTGRES_DB: pam_callleadcenter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  calls-service:
    build: ./services/calls
    environment:
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_TRANSFER_NUMBER: ${TWILIO_TRANSFER_NUMBER}
    ports:
      - "8001:8001"

  callcoaching-service:
    build: ./services/callcoaching
    ports:
      - "8002:8002"

  leads-service:
    build: ./services/leads
    environment:
      DATABASE_URL: postgresql+asyncpg://pam:pam@postgres:5432/pam_callleadcenter
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
    depends_on:
      - postgres
    ports:
      - "8003:8003"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - calls-service
      - callcoaching-service
      - leads-service

volumes:
  postgres_data:
