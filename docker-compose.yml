version: "3.9"

services:
  api:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
      - mailhog
    ports:
      - "8000:8000"
    volumes:
      - ./:/srv

  worker:
    build: .
    command: python -m app.worker
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./:/srv

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pam
      POSTGRES_PASSWORD: pam
      POSTGRES_DB: pam_ai_contact_center
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
